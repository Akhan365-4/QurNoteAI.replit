kind = "mobile"
previewPath = "/quran-mobile/"
title = "Quran Mobile"
version = "1.0.0"
id = "artifacts/quran-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/quran-mobile/" ]
localPort = 19010

[services.development]
run = "pnpm --filter @workspace/quran-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quran-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/quran-mobile", "run", "serve" ]

[services.env]
PORT = "19010"
BASE_PATH = "/quran-mobile/"
